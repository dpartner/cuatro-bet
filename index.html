<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuatrobet - Реєстрація</title>
  </head>
  <body>
    <header class="header">
      <a href="#" aria-label="Cuatrobet">
        <img src="/images/logo.svg" alt="Cuatrobet" height="32" class="brand__logo" />
      </a>
      <a class="signin" href="#">INICIAR SESION</a>
    </header>
    <main class="page">
      <section class="hero" aria-label="Пропозиція bienvenida">

        <div class="hero__content">
          <p class="hero__kicker">BONO</p>
          <h1 class="hero__title">DE BIENVENIDA</h1>
        </div>
      </section>

      <section class="form-panel" aria-label="Форма реєстрації">
        <div class="form__content">
          <h2 class="form-panel__title">OBTENER BONIFICACION</h2>

          <a class="bonus-card" href="#" aria-label="Бонусна пропозиція">
            <img 
              src="/images/bono/bono_1@1x.webp" 
              srcset="/images/bono/bono_1@1x.webp 1x, /images/bono/bono_1@2x.webp 2x" 
              alt="User" 
              class="bonus-card__icon" 
            />
            <div class="bonus-card__body">
              <p class="bonus-card__top">
                <span class="bonus-card__badge">Bono</span>
                de Bienvenida para Slotsde Casino
              </p>
              <p class="bonus-card__text">
                Bono de Slots de hasta el <strong>150%</strong><br />
                <strong>+ 60 FS</strong> con tu primer depósito
              </p>
            </div>
            <span class="bonus-card__arrow" aria-hidden="true">›</span>
          </a>

          <form class="register-form" id="register-form" novalidate>
            <div class="register-form__grid">
              <label class="field">
                <img src="/images/icons/person.svg" alt="first name" class="field__icon" />
                <input type="text" name="firstName" placeholder="First Name" required />
                <span class="field__hidden-placeholder" aria-hidden="true">First Name</span>
                <!-- <span class="field__error">First name is required</span> -->
              </label>

              <label class="field">
                <img src="/images/icons/person.svg" alt="last name" class="field__icon" />
                <input type="text" name="lastName" placeholder="Last Name" required />
                <span class="field__hidden-placeholder" aria-hidden="true">Last Name</span>
              </label>
            </div>

            <label class="field">
              <img src="/images/icons/mail.svg" alt="email" class="field__icon" />
              <input type="email" name="email" placeholder="Correo electrónico" required />
              <span class="field__hidden-placeholder" aria-hidden="true">Correo electrónico</span>
            </label>

            <label class="field field--phone">
              <img src="/images/icons/flag.png" alt="phone" class="field__icon" />
              <input type="tel" name="phone" placeholder="Número de teléfono" required />
              <span class="field__hidden-placeholder" aria-hidden="true">Número de teléfono</span>
            </label>

            <label class="field field--password">
              <img src="/images/icons/psw.svg" alt="password" class="field__icon" />
              <input type="password" name="password" placeholder="Contraseña" required minlength="8" />
              <span class="field__hidden-placeholder" aria-hidden="true">Contraseña</span>
              <button class="field__toggle" type="button" aria-label="Show password">
                <img src="/images/icons/eye.svg" alt="eye" class="field__eye" />
              </button>
            </label>

            <label class="check">
              <input type="checkbox" name="isAdult" id="isAdult" required />
              <span class="check__box" aria-hidden="true">
                <img src="/images/icons/check.svg" alt="" class="check__icon" />
              </span>
              <span class="check__text">
                <span>Soy mayor de <strong>18</strong> años y acepto</span>
                <a href="#">los términos del contrato de oferta</a>
              </span>
            </label>

            <button class="register-form__submit" type="submit">REGISTER</button>
            <p class="register-form__signin">
              ¿Ya tenés una cuenta?
              <a href="#">Iniciar sesión</a>
            </p>
            <p class="register-form__message" id="form-message" aria-live="polite"></p>
          </form>
        </div>
        <div class="form-panel__background-wrapper">
          <img src="/images/form/form-mob-bg.png" alt="Form background" class="form-panel__background" />
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
