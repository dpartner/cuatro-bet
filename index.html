<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuatrobet - Registro</title>
    <link rel="icon" type="image/svg" href="/images/logo-fav.svg">
  </head>
  <body>
    <header class="header">
      <a href="#" aria-label="Cuatrobet">
        <img src="/images/logo.svg" alt="Cuatrobet" height="32" class="brand__logo" />
      </a>
      <a class="signin" href="#">INICIAR SESION</a>
    </header>
    <main class="page">
      <section class="hero" aria-label="Welcome bonus">

        <div class="hero__content">
          <p class="hero__kicker">BONO</p>
          <h1 class="hero__title">DE BIENVENIDA</h1>
        </div>
      </section>

      <section class="form-panel" aria-label="Registration form">
        <div class="form__content">
          <div class="form__content-header">
            <h2 class="form-panel__title">OBTENER BONIFICACION</h2>
            <a href="#" aria-label="hotline" class="form__content-hotline-wrap">
              <svg width="17" height="18" viewBox="0 0 17 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.25 8.12474V14.3747C16.25 15.2035 15.9208 15.9984 15.3347 16.5845C14.7487 17.1705 13.9538 17.4997 13.125 17.4997H8.75C8.58424 17.4997 8.42527 17.4339 8.30806 17.3167C8.19085 17.1995 8.125 17.0405 8.125 16.8747C8.125 16.709 8.19085 16.55 8.30806 16.4328C8.42527 16.3156 8.58424 16.2497 8.75 16.2497H13.125C13.6223 16.2497 14.0992 16.0522 14.4508 15.7006C14.8025 15.3489 15 14.872 15 14.3747H13.125C12.6277 14.3747 12.1508 14.1772 11.7992 13.8256C11.4475 13.4739 11.25 12.997 11.25 12.4997V9.37474C11.25 8.87746 11.4475 8.40055 11.7992 8.04892C12.1508 7.69729 12.6277 7.49974 13.125 7.49974H14.9727C14.8544 6.20048 14.3689 4.96168 13.5728 3.92806C12.7768 2.89443 11.703 2.10865 10.477 1.6625C9.25106 1.21635 7.92344 1.12824 6.64925 1.40847C5.37507 1.6887 4.20692 2.32569 3.28125 3.24505C2.1302 4.38092 1.42025 5.88887 1.27813 7.49974H3.125C3.62228 7.49974 4.0992 7.69729 4.45083 8.04892C4.80246 8.40055 5 8.87746 5 9.37474V12.4997C5 12.997 4.80246 13.4739 4.45083 13.8256C4.0992 14.1772 3.62228 14.3747 3.125 14.3747H1.875C1.37772 14.3747 0.900806 14.1772 0.549175 13.8256C0.197544 13.4739 0 12.997 0 12.4997V8.12474C0.0017523 6.51529 0.480956 4.94253 1.37696 3.60555C2.27296 2.26856 3.54547 1.22745 5.03343 0.613999C6.52139 0.000547022 8.1579 -0.157669 9.73582 0.159376C11.3137 0.476421 12.7621 1.25447 13.8977 2.39505C14.6474 3.14842 15.2411 4.04231 15.6447 5.02552C16.0484 6.00872 16.2541 7.06191 16.25 8.12474Z" fill="currentColor"/>
              </svg>
            </a>
          </div>

          <button class="bonus-card" aria-label="Welcome bonus">
            <img 
              src="/images/bono/bono_1@1x.webp" 
              srcset="/images/bono/bono_1@1x.webp 1x, /images/bono/bono_1@2x.webp 2x" 
              alt="User" 
              class="bonus-card__icon" 
            />
            <div class="bonus-card__body">
              <p class="bonus-card__top">
                <span class="bonus-card__badge">Bono</span>
                de Bienvenida para Slotsde Casino
              </p>
              <p class="bonus-card__text">
                Bono de Slots de hasta el <strong>150%</strong><br />
                <strong>+ 60 FS</strong> con tu primer depósito
              </p>
            </div>
            <div class="bonus-card__arrow-wrapper">
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 13L7 7L1 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </button>

          <form class="register-form" id="register-form" novalidate>
            <input type="hidden" name="selectedBonus" id="selected-bonus-input" value="" />
            <label class="field">
              <img src="/images/icons/mail.svg" alt="email" class="field__icon" />
              <input type="email" name="email" placeholder="Correo electrónico" required />
              <span class="field__hidden-placeholder" aria-hidden="true">Correo electrónico</span>
              <span class="field__error">
                <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                Email is required
              </span>
            </label>

            <label class="field field--phone">
              <img src="/images/icons/flag.png" alt="phone" class="field__icon" />
              <input type="tel" name="phone" placeholder="Número de teléfono" required inputmode="numeric" />
              <span class="field__hidden-placeholder" aria-hidden="true">Número de teléfono</span>
              <span class="field__error">
                <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                Phone is required
              </span>
            </label>

            <label class="field field--password">
              <img src="/images/icons/psw.svg" alt="password" class="field__icon" />
              <input type="password" name="password" placeholder="Contraseña" required minlength="6" />
              <span class="field__hidden-placeholder" aria-hidden="true">Contraseña</span>
              <button class="field__toggle" type="button" aria-label="Show password">
                <img src="/images/icons/eye-false.svg" alt="eye" class="field__eye" />
              </button>
              <span class="password-requirements">
                <span class="requirement-icon"></span>
                al menos 6 caracteres
              </span>
            </label>

            <label class="check">
              <input type="checkbox" name="isAdult" id="isAdult" required checked />
              <span class="check__box" aria-hidden="true">
                <img src="/images/icons/check.svg" alt="" class="check__icon" />
              </span>
              <span class="check__text">
                <span>Soy mayor de <strong>18</strong> años y acepto</span><a href="#">los términos del contrato de oferta</a>
                <span class="field__error">
                  <img src="/images/icons/error.svg" alt="error" class="field__error-icon" />
                  You must be at least 18 years old
                </span>
              </span>
            </label>

            <button class="register-form__submit" type="submit">
              <span class="register-form__submit-text">REGISTER</span>
              <svg width="426" height="72" viewBox="0 0 426 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#clip0_52_1797)">
                <path d="M-386 -431L-282.874 -355.294L-275.874 -367.419L-172.75 -291.714L-165.75 -303.838L-62.6238 -228.133L-55.6238 -240.257L47.5022 -164.552L54.5022 -176.676L157.627 -100.971L164.627 -113.096L267.752 -37.39L274.752 -49.5144L377.878 26.1912L384.878 14.0669L488.003 89.7716L495.003 77.6472L598.129 153.353L605.129 141.228L708.255 216.934" stroke="stroke" stroke-width="2"/>
                <path d="M-111 688.255L-35.2944 585.129L-47.4188 578.129L28.2859 475.005L16.1616 468.005L91.8672 364.879L79.7428 357.879L155.448 254.753L143.324 247.753L219.029 144.628L206.904 137.628L282.61 34.5024L270.486 27.5024L346.191 -75.6236L334.067 -82.6236L409.772 -185.748L397.647 -192.748L473.353 -295.874L461.228 -302.874L536.934 -406" stroke="stroke" stroke-width="2"/>
                <path d="M-494.332 -518.58L-406.61 -425.461L-397.532 -436.118L-309.811 -343L-300.733 -353.657L-213.011 -260.538L-203.932 -271.195L-116.211 -178.076L-107.132 -188.733L-19.4119 -95.6148L-10.3332 -106.272L77.3884 -13.1527L86.4671 -23.81L174.189 69.3094L183.267 58.6521L270.988 151.77L280.066 141.113L367.788 234.232L376.867 223.575L464.588 316.694" stroke="stroke" stroke-width="2"/>
                <path d="M-512 570.171L-412.183 490.153L-422.083 480.253L-322.267 400.237L-332.166 390.337L-232.349 310.319L-242.249 300.42L-142.432 220.402L-152.331 210.502L-52.5158 130.486L-62.4153 120.586L37.4017 40.5682L27.5022 30.6687L127.319 -49.3492L117.42 -59.2487L217.235 -139.265L207.336 -149.165L307.153 -229.183L297.253 -239.082L397.07 -319.1" stroke="stroke" stroke-width="2"/>
                </g>
                <defs>
                <clipPath id="clip0_52_1797">
                <rect width="426" height="72" rx="12" fill="white"/>
                </clipPath>
                </defs>
              </svg>
              </button>
            <p class="register-form__signin">
              ¿Ya tenés una cuenta?
              <a href="#">Iniciar sesión</a>
            </p>
          </form>
        </div>
        <div class="form-panel__background-wrapper">
          <picture>
            <source srcset="/images/form/form-tab-bg.png" media="(min-width: 768px) and (max-width: 1365px)">
            <source srcset="/images/form/form-desk-bg.png" media="(min-width: 1366px)">
            <img src="/images/form/form-mob-bg.png" alt="Form background" class="form-panel__background" />
          </picture>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script src="https://unpkg.com/imask"></script>
  </body>
</html>
